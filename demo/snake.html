<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #111;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: "Courier New", Courier, monospace;
    color: #0f0;
    overflow: hidden;
  }
  #score {
    font-size: 24px;
    margin-bottom: 12px;
    letter-spacing: 2px;
    text-shadow: 0 0 8px #0f0;
  }
  #game-container {
    position: relative;
    border: 2px solid #0f0;
    box-shadow: 0 0 16px #0f0;
  }
  canvas { display: block; }
  #overlay {
    display: none;
    position: absolute;
    inset: 0;
    background: rgba(0, 0, 0, 0.85);
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
  }
  #overlay.active { display: flex; }
  #overlay h1 {
    font-size: 36px;
    color: #f00;
    text-shadow: 0 0 12px #f00;
    letter-spacing: 4px;
  }
  #overlay p {
    font-size: 22px;
    color: #0f0;
    text-shadow: 0 0 8px #0f0;
  }
  #restart {
    margin-top: 8px;
    padding: 10px 28px;
    font-family: "Courier New", Courier, monospace;
    font-size: 18px;
    background: transparent;
    color: #0f0;
    border: 2px solid #0f0;
    cursor: pointer;
    letter-spacing: 2px;
    text-transform: uppercase;
    box-shadow: 0 0 8px #0f0;
  }
  #restart:hover { background: #0f0; color: #111; }
</style>
</head>
<body>
<div id="score">SCORE: 0</div>
<div id="game-container">
  <canvas id="canvas"></canvas>
  <div id="overlay">
    <h1>GAME OVER</h1>
    <p id="final-score"></p>
    <button id="restart">RESTART</button>
  </div>
</div>
<script>
(function () {
  var COLS = 20;
  var ROWS = 20;
  var CELL = 20;
  var TICK = 100; // ~10 FPS

  var canvas = document.getElementById("canvas");
  var ctx = canvas.getContext("2d");
  canvas.width = COLS * CELL;
  canvas.height = ROWS * CELL;

  var scoreEl = document.getElementById("score");
  var overlay = document.getElementById("overlay");
  var finalScoreEl = document.getElementById("final-score");
  var restartBtn = document.getElementById("restart");

  var snake, dir, nextDir, food, score, running, lastTick, rafId;

  function init() {
    if (rafId) cancelAnimationFrame(rafId);
    var midX = Math.floor(COLS / 2);
    var midY = Math.floor(ROWS / 2);
    snake = [
      { x: midX, y: midY },
      { x: midX - 1, y: midY },
      { x: midX - 2, y: midY }
    ];
    dir = { x: 1, y: 0 };
    nextDir = { x: 1, y: 0 };
    score = 0;
    running = true;
    lastTick = 0;
    scoreEl.textContent = "SCORE: 0";
    overlay.classList.remove("active");
    spawnFood();
    rafId = requestAnimationFrame(loop);
  }

  function spawnFood() {
    var empty = [];
    for (var r = 0; r < ROWS; r++) {
      for (var c = 0; c < COLS; c++) {
        var occupied = false;
        for (var i = 0; i < snake.length; i++) {
          if (snake[i].x === c && snake[i].y === r) { occupied = true; break; }
        }
        if (!occupied) empty.push({ x: c, y: r });
      }
    }
    if (empty.length === 0) {
      food = null;
      return;
    }
    food = empty[Math.floor(Math.random() * empty.length)];
  }

  function loop(ts) {
    if (!running) return;
    if (ts - lastTick >= TICK) {
      lastTick = ts;
      update();
      draw();
    }
    rafId = requestAnimationFrame(loop);
  }

  function update() {
    dir = { x: nextDir.x, y: nextDir.y };
    var head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

    // Wall collision
    if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
      gameOver();
      return;
    }

    // Self collision
    for (var i = 0; i < snake.length; i++) {
      if (snake[i].x === head.x && snake[i].y === head.y) {
        gameOver();
        return;
      }
    }

    snake.unshift(head);

    // Food collision
    if (food && head.x === food.x && head.y === food.y) {
      score++;
      scoreEl.textContent = "SCORE: " + score;
      spawnFood();
      if (!food) { winGame(); return; }
    } else {
      snake.pop();
    }
  }

  function draw() {
    // Background
    ctx.fillStyle = "#111";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Grid lines (subtle)
    ctx.strokeStyle = "#1a1a1a";
    ctx.lineWidth = 0.5;
    for (var i = 0; i <= COLS; i++) {
      ctx.beginPath();
      ctx.moveTo(i * CELL, 0);
      ctx.lineTo(i * CELL, canvas.height);
      ctx.stroke();
    }
    for (var j = 0; j <= ROWS; j++) {
      ctx.beginPath();
      ctx.moveTo(0, j * CELL);
      ctx.lineTo(canvas.width, j * CELL);
      ctx.stroke();
    }

    // Food
    if (food) {
    ctx.fillStyle = "#f00";
    ctx.shadowColor = "#f00";
    ctx.shadowBlur = 8;
    ctx.fillRect(food.x * CELL + 1, food.y * CELL + 1, CELL - 2, CELL - 2);
    }

    // Snake
    ctx.shadowColor = "#0f0";
    ctx.shadowBlur = 6;
    for (var k = 0; k < snake.length; k++) {
      ctx.fillStyle = k === 0 ? "#0f0" : "#0c0";
      ctx.fillRect(snake[k].x * CELL + 1, snake[k].y * CELL + 1, CELL - 2, CELL - 2);
    }
    ctx.shadowBlur = 0;
  }

  function winGame() {
    running = false;
    draw();
    overlay.querySelector("h1").textContent = "YOU WIN!";
    overlay.querySelector("h1").style.color = "#0f0";
    overlay.querySelector("h1").style.textShadow = "0 0 12px #0f0";
    finalScoreEl.textContent = "SCORE: " + score;
    overlay.classList.add("active");
  }

  function gameOver() {
    running = false;
    draw();
    overlay.querySelector("h1").textContent = "GAME OVER";
    overlay.querySelector("h1").style.color = "#f00";
    overlay.querySelector("h1").style.textShadow = "0 0 12px #f00";
    finalScoreEl.textContent = "SCORE: " + score;
    overlay.classList.add("active");
  }

  // Input
  document.addEventListener("keydown", function (e) {
    switch (e.key) {
      case "ArrowUp":
        if (dir.y !== 1) nextDir = { x: 0, y: -1 };
        e.preventDefault();
        break;
      case "ArrowDown":
        if (dir.y !== -1) nextDir = { x: 0, y: 1 };
        e.preventDefault();
        break;
      case "ArrowLeft":
        if (dir.x !== 1) nextDir = { x: -1, y: 0 };
        e.preventDefault();
        break;
      case "ArrowRight":
        if (dir.x !== -1) nextDir = { x: 1, y: 0 };
        e.preventDefault();
        break;
    }
  });

  restartBtn.addEventListener("click", init);

  init();
})();
</script>
</body>
</html>
